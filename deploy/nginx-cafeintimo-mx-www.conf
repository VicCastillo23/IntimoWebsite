# Copiar a /etc/nginx/sites-available/cafeintimo-mx-www.conf y enlazar en sites-enabled:
#   sudo ln -sf /etc/nginx/sites-available/cafeintimo-mx-www.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Cuando el DNS de cafeintimo.mx apunte a esta EC2:
#   sudo certbot --nginx -d cafeintimo.mx -d www.cafeintimo.mx
# (Certbot añadirá listen 443 y certificados.)

server {
    listen 80;
    listen [::]:80;
    server_name cafeintimo.mx www.cafeintimo.mx;

    root /opt/intimo/IntimoWebsite;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    access_log /var/log/nginx/cafeintimo-mx-www.access.log;
    error_log  /var/log/nginx/cafeintimo-mx-www.error.log;
}
